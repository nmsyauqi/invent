<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris</title>
</head>
<body>
    <h2>Invent</h2>
    
    <input type="text" id="inputBarang" placeholder="Nomen...">
    <button id="btnTambah">Ita</button>

    <ul id="daftarBarang">
        </ul>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const { createClient } = supabase;
        const supabaseUrl = 'https://wrcfiapabfbnyoqdwfgl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyY2ZpYXBhYmZibnlvcWR3ZmdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNDU5MzMsImV4cCI6MjA5ODcyMTkzM30.4A1z0y8kqQkLv2qnwiI5udd9z8_FRUNXAOoY9IdFduw';
        const db = createClient(supabaseUrl, supabaseKey);

        const elemenDaftar = document.getElementById('daftarBarang');

                // read
        async function ambilDataBarang() {
            const { data, error } = await db.from('order').select('*').order('order_id', { ascending: false });

            if (error) {
                console.error("Infelix legere:", error.message);
                return;
            }
            
            elemenDaftar.innerHTML = '';

            data.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item.customer_name + " " + item.customer_id + " " + item.order_id + " ";
                
                const btnEdit = document.createElement('button');
                btnEdit.textContent = "Mutare";
                btnEdit.onclick = () => editBarang(item.order_id);

                const btnHapus = document.createElement('button');
                btnHapus.textContent = "Delere";
                btnHapus.onclick = () => hapusBarang(item.order_id);

                li.appendChild(btnEdit);
                li.appendChild(btnHapus);
                elemenDaftar.appendChild(li);
            });
        }

        // create
        async function tambahBarangBaru(namaBarangInput) {
            const { error } = await db.from('order').insert([
                { nama_barang: namaBarangInput } 
            ]);

            if (error) {
                console.error("Infelix creare:", error.message);
                alert("Infelix, in konsole vide!");
            } else {
                ambilDataBarang();
            }
        }

        // update
        async function editBarang(idBarang) {
            const namaBaru = prompt("Mutare:");
    
            if (namaBaru) {
                const { error } = await db.from('order')
                    .update({ nama_barang: namaBaru })
                    .eq('id', idBarang); 

                if (error) {
                    console.error("Infelix mutare:", error.message);
                } else {
                    ambilDataBarang(); 
                }
            }
        }


        // delete
        async function hapusBarang(idBarang) {
            const konfirmasi = confirm("Delere?");
            
            if (konfirmasi) {
                const { error } = await db.from('order')
                    .delete()
                    .eq('id', idBarang);

                if (error) {
                    console.error("Infelix delere:", error.message);
                } else {
                    ambilDataBarang(); // Refresh tabel
                }
            }
        }
        
        document.getElementById('btnTambah').addEventListener('click', () => {
            const elemenInput = document.getElementById('inputBarang');
            if (elemenInput.value) {
                tambahBarangBaru(elemenInput.value); 
                elemenInput.value = ''; 
            }
        });

        ambilDataBarang();

    </script>
</body>
</html>
