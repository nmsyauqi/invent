    <title>Inventaris</title>

<body>
    <h2>Katalog Inventaris</h2>
    
    <input type="text" id="inputBarang" placeholder="Masukkan nama barang...">
    <button id="btnTambah">Simpan</button>

    <ul id="daftarBarang">
        <script>
            // read
            async function ambilDataBarang() {
                const { data, error } = await db.from('barang').select('*');

                if (error) {
                    console.error("Gagal mengambil data:", error.message);
                    return;
                }

                console.log("Data barang dari database:", data);
            }

            // create
            async function tambahBarangBaru(namaBarangInput) {
                const { data, error } = await db.from('barang').insert([
                    { nama: namaBarangInput } 
                ]);

                if (error) {
                    console.error("Gagal menambah barang:", error.message);
                } else {
                    console.log("Barang berhasil ditambah!");
                    ambilDataBarang(); 
                }
            }
            
            document.getElementById('btnTambah').addEventListener('click', () => {
                const input = document.getElementById('inputBarang').value;
                if (input) {
                    tambahBarangBaru(input);
                    document.getElementById('inputBarang').value = '';
                }
            });

        </script>
    </ul>
